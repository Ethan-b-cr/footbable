<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据中心 | World Cup Edge</title>
  <meta name="description" content="查看 World Cup Edge 的本地世界杯数据快照、球队样本、球员样本和数据状态。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell article-shell">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="World Cup Edge 首页">
        <span class="brand-mark brand-logo-shell"><img class="brand-logo" src="assets/images/world-cup-edge-logo.svg" alt="World Cup Edge logo"></span>
        <span class="brand-copy">
          <strong>World Cup Edge</strong>
          <span>专业分析，专业赚钱</span>
        </span>
      </a>
      <nav class="site-nav" aria-label="主导航">
        <a href="index.html#matches">公开分析</a>
        <a href="teams.html">球队</a>
        <a href="players.html">球员</a>
        <a href="sources.html">数据来源</a>
        <a href="members.html">完整内容</a>
      </nav>
      <div class="header-actions">
        <a class="header-link" href="login.html">会员登录</a>
        <a class="header-cta" href="members.html">查看完整内容</a>
        <button class="header-ghost" id="logout-button" type="button" hidden>退出登录</button>
      </div>
    </header>

    <main>
      <section class="article-hero article-hero-visual">
        <div class="article-hero-copy">
          <p class="eyebrow">数据中心</p>
          <h1>先把真实数据底座搭稳，分析网站才像真的站</h1>
          <p class="hero-text">
            这里展示世界杯历史比赛、球队样本和球员样本的本地快照，用来支撑首页、球队页、球员页和会员深度内容。
          </p>
        </div>
        <aside class="article-side-card">
          <img
            class="hero-side-image"
            src="assets/images/argentina-champion.jpg"
            alt="世界杯冠军庆祝画面"
          >
        </aside>
      </section>

      <section class="section article-list" id="data-summary-cards"></section>

      <section class="section">
        <div class="faq-item">
          <h2>当前数据状态</h2>
          <p id="data-status-text">如果已生成本地快照，这里会显示最近更新时间和当前可用数据范围。</p>
        </div>
      </section>

      <section class="section data-grid">
        <div class="faq-item">
          <h2>球队汇总 Top 10</h2>
          <div id="team-summary-table" class="table-shell"></div>
        </div>
        <div class="faq-item">
          <h2>最新比赛记录</h2>
          <div id="latest-matches-table" class="table-shell"></div>
        </div>
      </section>

      <section class="section">
        <div class="section-heading">
          <div>
            <p class="eyebrow">公开比赛流</p>
            <h2>每场比赛先看粗浅分析</h2>
          </div>
          <p>全部比赛都能先看时间、状态、重点边和基础判断，深入分析继续进会员区。</p>
        </div>
        <div class="live-match-grid" id="public-live-match-grid"></div>
      </section>

      <section class="section">
        <div class="faq-item">
          <h2>球员出场 Top 15</h2>
          <div id="player-summary-table" class="table-shell"></div>
        </div>
      </section>

      <section class="section">
        <div class="faq-item">
          <h2>球员进攻样本 Top 10</h2>
          <div id="scorer-summary-table" class="table-shell"></div>
        </div>
      </section>

      <section class="section data-grid">
        <div class="faq-item" id="data-scorer-spotlight"></div>
        <div class="faq-item" id="data-final-snapshot"></div>
      </section>
    </main>

    <footer class="mini-footer">
      <a href="index.html">返回首页</a>
      <a href="sources.html">数据来源</a>
      <a href="members.html">完整内容</a>
    </footer>
  </div>
  <script src="site-config.js"></script>
  <script src="script.js"></script>
</body>
</html>
