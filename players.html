<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>球员分析库 | World Cup Edge</title>
  <meta name="description" content="查看世界杯球员分析库，基于真实出场、首发、进球、xG 和传球数据整理球员表现。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell article-shell">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="World Cup Edge 首页">
        <span class="brand-mark">W</span>
        <span class="brand-copy">
          <strong>World Cup Edge</strong>
          <span>世界杯数据分析站</span>
        </span>
      </a>
      <nav class="site-nav" aria-label="主导航">
        <a href="index.html#matches">公开分析</a>
        <a href="teams.html">球队</a>
        <a href="players.html">球员</a>
        <a href="data.html">数据中心</a>
        <a href="sources.html">数据来源</a>
      </nav>
      <div class="header-actions">
        <a class="header-link" href="login.html">会员登录</a>
        <a class="header-cta" href="members.html">查看完整内容</a>
        <button class="header-ghost" id="logout-button" type="button" hidden>退出登录</button>
      </div>
    </header>

    <main>
      <section class="article-hero article-hero-visual compact-library-hero">
        <div class="article-hero-copy conversion-hero-copy">
          <h1>热门球星、关键射手和核心组织者，都在这里集中展开</h1>
          <p class="hero-text">
            先看 3 名免费样本，后面的重点人物继续往下展开。
          </p>
          <div class="hero-actions">
            <a class="button button-primary" href="members.html">继续看完整内容</a>
            <a class="button button-secondary" href="index.html#players">回首页样本</a>
          </div>
        </div>
        <aside class="article-side-card visual-mosaic-card">
          <div class="visual-mosaic">
            <article class="visual-mosaic-tile visual-mosaic-tile-tall">
              <img src="assets/images/messi.jpg" alt="Messi 画面">
              <span>Messi</span>
            </article>
            <article class="visual-mosaic-tile visual-mosaic-tile-tall">
              <img src="assets/images/mbappe.jpg" alt="Mbappe 画面">
              <span>Mbappe</span>
            </article>
            <article class="visual-mosaic-tile visual-mosaic-tile-wide">
              <img src="assets/images/ronaldo.jpg" alt="Ronaldo 画面">
              <span>Ronaldo</span>
            </article>
          </div>
        </aside>
      </section>

      <section class="section">
        <div class="filter-bar">
          <div class="section-heading">
            <div>
              <p class="eyebrow">先看样本</p>
              <h2>免费放 3 名，其余继续锁定预览</h2>
            </div>
            <p>先看最热的几名，其他名字继续往里翻。</p>
          </div>
          <div class="filter-field">
            <span>搜索球员</span>
            <input id="player-search-input" type="text" placeholder="例如：Messi / Mbappe / Ronaldo">
          </div>
        </div>
      </section>

      <section class="section">
        <div class="entity-grid" id="players-page-list"></div>
        <div class="section-actions">
          <a class="button button-primary" href="members.html">继续看完整内容</a>
        </div>
      </section>
    </main>

    <footer class="mini-footer">
      <a href="index.html">返回首页</a>
      <a href="teams.html">球队分析库</a>
      <a href="data.html">数据中心</a>
      <a href="sources.html">数据来源</a>
    </footer>
  </div>
  <script src="site-config.js"></script>
  <script src="script.js"></script>
</body>
</html>
